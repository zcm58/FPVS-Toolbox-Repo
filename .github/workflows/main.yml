name: Agent harness

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
  workflow_call:

jobs:
  agent-harness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML mkdocs-material

      - name: Run repo agent audit
        run: python .agents/scripts/audit/agent_audit.py

      - name: Run skill audit wrappers
        run: |
          python .agents/skills/pyside6-gui-cleanup/scripts/audit_gui_imports.py
          python .agents/skills/legacy-boundary-review/scripts/audit_protected_edits.py
          python .agents/skills/project-path-audit/scripts/audit_hardcoded_paths.py

      - name: Validate workflow YAML
        run: |
          python -c "import pathlib, yaml; [yaml.safe_load(path.read_text(encoding='utf-8')) for path in pathlib.Path('.github/workflows').glob('*.yml')]"

      - name: Build user documentation
        run: mkdocs build --strict
