site_name: FPVS Toolbox
site_description: Documentation for processing FPVS EEG data and running publication-oriented analyses with FPVS Toolbox.
site_url: https://zcm58.github.io/FPVS-Toolbox-Repo/
repo_url: https://github.com/zcm58/FPVS-Toolbox-Repo
repo_name: zcm58/FPVS-Toolbox-Repo
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
strict: true
exclude_docs: |
  README.md
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.expand
    - navigation.indexes
    - toc.integrate
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
    - search.share

plugins:
  - search:
      lang: en

not_in_nav: |
  /README.md
  /DESIGN.md
  /FRONTEND.md
  /PLANS.md
  /PRODUCT_SENSE.md
  /QUALITY_SCORE.md
  /RELIABILITY.md
  /SECURITY.md
  /development.md
  /legacy-quarantine-audit.md
  /agent-index.md
  /agent-prompts/*
  /architecture/*
  /design-docs/*
  /exec-plans/*
  /generated/*
  /product-specs/*
  /quality/*
  /references/*
  /reviews/*

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - def_list
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Start Here:
      - Getting Started: getting-started.md
      - FPVS Concepts for Non-Experts: fpvs-concepts.md
      - First End-to-End Walkthrough: tutorial.md
      - FAQ: faq.md
  - Run a Study:
      - Overview: run-a-study.md
      - Project Setup: project-setup.md
      - Processing Pipeline: processing-pipeline.md
      - Output Files: outputs-reference.md
      - Troubleshooting: troubleshooting.md
  - Understand Results:
      - Overview: understand-results.md
      - FFT and Frequency-Domain Quantification (FPVS): fft-frequency-domain-quantification.md
      - Statistical Analysis Overview: statistical-analysis.md
      - Which Statistical Test Should I Use?: statistics/which-test.md
      - Outliers and QC: statistics/outliers-and-qc.md
  - Statistics Reference:
      - Overview: statistics/index.md
      - Rossion Harmonic Selection: statistics/rossion-harmonic-selection.md
      - RM-ANOVA: statistics/rm-anova.md
      - Post-hoc Tests: statistics/posthoc-tests.md
      - Mixed Model: statistics/mixed-model.md
      - Baseline vs Zero Tests: statistics/baseline-vs-zero.md
  - Tools:
      - Feature Tour: feature-tour.md
      - Individual-level Detectability: tools/individual-level-detectability.md
  - Reference:
      - Methods Reporting Checklist: methods-reporting-checklist.md
      - Glossary: glossary.md
      - Relevant Publications: relevant-publications.md
