site_name: FPVS Toolbox
site_description: Documentation for processing FPVS EEG data and running publication-oriented analyses with FPVS Toolbox.
site_url: https://zcm58.github.io/FPVS-Toolbox-Repo/
repo_url: https://github.com/zcm58/FPVS-Toolbox-Repo
repo_name: zcm58/FPVS-Toolbox-Repo
edit_uri: edit/main/docs/user/
docs_dir: docs/user
site_dir: site
strict: true
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.expand
    - navigation.indexes
    - toc.integrate
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
    - search.share

plugins:
  - search:
      lang: en

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - def_list
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Start Here:
      - Getting Started: start/getting-started.md
      - FPVS Concepts for Non-Experts: start/fpvs-concepts.md
      - First End-to-End Walkthrough: start/tutorial.md
      - FAQ: start/faq.md
  - Run a Study:
      - Overview: study/run-a-study.md
      - Project Setup: study/project-setup.md
      - Processing Pipeline: study/processing-pipeline.md
      - Output Files: study/outputs-reference.md
      - Troubleshooting: study/troubleshooting.md
  - Understand Results:
      - Overview: results/understand-results.md
      - FFT and Frequency-Domain Quantification (FPVS): results/fft-frequency-domain-quantification.md
      - Statistical Analysis Overview: results/statistical-analysis.md
      - Which Statistical Test Should I Use?: statistics/which-test.md
      - Outliers and QC: statistics/outliers-and-qc.md
  - Statistics Reference:
      - Overview: statistics/index.md
      - Harmonic Selection: statistics/rossion-harmonic-selection.md
      - RM-ANOVA: statistics/rm-anova.md
      - Post-hoc Tests: statistics/posthoc-tests.md
      - Mixed Model: statistics/mixed-model.md
      - External Statistics Software: statistics/external-statistics-software.md
      - Baseline vs Zero Tests: statistics/baseline-vs-zero.md
  - Tools:
      - Feature Tour: tools/feature-tour.md
      - SNR Plot Generator: tools/snr-plot-generator.md
      - Scalp Maps: tools/scalp-maps.md
      - LORETA Visualizer: tools/loreta-visualizer.md
      - Source Localization Method: tools/source-localization-method.md
      - Ratio Calculator: tools/ratio-calculator.md
      - Sequence Figure: tools/sequence-figure.md
      - Image Resizer: tools/image-resizer.md
      - Epoch Averaging: tools/epoch-averaging.md
      - Individual-level Detectability: tools/individual-level-detectability.md
  - Reference:
      - Methods Reporting Checklist: reference/methods-reporting-checklist.md
      - FPVS Studio Config Import: reference/fpvs-studio-config-import.md
      - Glossary: reference/glossary.md
