site_name: FPVS Toolbox
site_description: Basic FPVS Toolbox documentation, tool pages, and reference links.
site_url: https://zcm58.github.io/FPVS-Toolbox-Repo/
repo_url: https://github.com/zcm58/FPVS-Toolbox-Repo
repo_name: zcm58/FPVS-Toolbox-Repo
edit_uri: edit/main/docs/user/
docs_dir: docs/user
site_dir: site
strict: true
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.expand
    - navigation.indexes
    - toc.integrate
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
    - search.share

plugins:
  - search:
      lang: en

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - def_list
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Tools:
      - Overview: tools/index.md
      - Epoch Averaging: tools/epoch-averaging.md
      - SNR Plot Generator: tools/snr-plot-generator.md
      - Publication Maps / Scalp Maps: tools/publication-maps.md
      - Statistics: tools/statistics.md
      - Ratio Calculator: tools/ratio-calculator.md
      - Sequence Figure: tools/sequence-figure.md
      - Image Resizer: tools/image-resizer.md
      - Individual-level Detectability: tools/individual-level-detectability.md
      - Publication Report: tools/publication-report.md
      - LORETA Visualizer: tools/loreta-visualizer.md
  - Reference:
      - Reference Links: reference/index.md
