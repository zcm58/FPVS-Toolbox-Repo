[tool.pytest.ini_options]
addopts = "-vv -p no:cacheprovider"
testpaths = [
    "tests",
]
norecursedirs = [
    ".git",
    ".codex-pytest-tmp",
    ".codex_pytest*",
    ".codex-tmp",
    ".pytest_cache",
    ".tmp",
    ".venv",
    ".venv1",
    ".venv3.10",
    "build",
    "codex_pytest_tmp",
    "dist",
    "pytest-cache-files-*",
    "site",
    "src/quarantine",
    "test_tmp",
]
markers = [
    "qt: marks tests that require a Qt application",
    "gui: marks PySide6 GUI, dialog, layout, window, and status UX tests",
    "stats: marks statistics pipeline, reporting, and statistics GUI tests",
    "project_io: marks project-root, manifest, import, export, and path discipline tests",
    "processing: marks preprocessing, post-processing, FFT/SNR, worker, and process-runner tests",
    "plot_generator: marks plot generator tests",
    "ratio: marks ratio calculator tests",
    "smoke: marks lightweight end-to-end, import, layout, or UI smoke tests",
    "integration: marks broader tests that exercise multiple modules or a full workflow",
    "slow: marks tests that are intentionally slower than the default local feedback loop",
]

[tool.mypy]
exclude = '^(?!src[\\/](Tools[\\/]Ratio_Calculator[\\/]|quarantine[\\/]ratio_calculator_mypy_entry\.py$)).+\.py$'
ignore_missing_imports = true

[tool.ruff]
exclude = [
    "src/Tools/Stats",
    "src/Compiler_Script.py",
    "src/quarantine",
]
line-length = 120
